<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>一点読みバトルAI</title>

<style>
body{
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
}

#battle{
font-size:28px;
margin:20px;
height:60px;
}

button{
padding:10px 18px;
margin:5px;
font-size:16px;
cursor:pointer;
}

#log{
margin-top:20px;
max-height:200px;
overflow:auto;
border:1px solid #444;
padding:10px;
}

.hp{
font-size:20px;
margin:10px;
}
</style>
</head>

<body>

<h1>一点読みバトル</h1>

<div class="hp">プレイヤーHP: <span id="php">3</span></div>

<div id="battle">
🤺　VS　👾
</div>

<div>
<button onclick="play('attack')">通常攻撃</button>
<button onclick="play('defense')">防御</button>
<button onclick="play('evade')">回避</button>
<button onclick="play('grab')">掴み</button>
<button onclick="play('special')">必殺技</button>
</div>

<h3>行動履歴</h3>
<div id="log"></div>

<script>

let playerHP = 3

const actions = ["attack","defense","evade","grab","special"]

const name = {
attack:"通常攻撃",
defense:"防御",
evade:"回避",
grab:"掴み",
special:"必殺技"
}

let playerHistory=[]

function enemyAI(){

if(playerHistory.length<3){
return randomMove()
}

let count={
attack:0,
defense:0,
evade:0,
grab:0,
special:0
}

playerHistory.forEach(a=>count[a]++)

let predicted = Object.keys(count).reduce((a,b)=>count[a]>count[b]?a:b)

return counterMove(predicted)

}

function counterMove(move){

switch(move){

case "attack":
return "attack"

case "defense":
return "grab"

case "evade":
return "special"

case "grab":
return "attack"

case "special":
return "defense"

}

}

function randomMove(){
return actions[Math.floor(Math.random()*5)]
}

function judge(enemy,player){

switch(enemy){

case "attack":
if(player==="defense") return "win"
if(player==="attack"||player==="evade") return "damage"
return "dead"

case "defense":
if(player==="grab") return "win"
if(player==="defense"||player==="evade") return "damage"
return "dead"

case "evade":
if(player==="special") return "win"
if(player==="defense"||player==="evade"||player==="grab") return "damage"
return "dead"

case "grab":
if(player==="special"||player==="attack") return "win"
if(player==="evade"||player==="grab") return "damage"
return "dead"

case "special":
if(player==="defense") return "win"
if(player==="special") return "damage"
return "dead"

}

}

function play(player){

if(playerHP<=0)return

playerHistory.push(player)

let enemy = enemyAI()

let result = judge(enemy,player)

let battleText = "🤺 "+name[player]+"　VS　"+name[enemy]+" 👾"

document.getElementById("battle").textContent=battleText

let log = document.getElementById("log")

let line = document.createElement("div")

if(result==="win"){

line.innerHTML="🔥 読み勝ち！即勝利！"
log.prepend(line)

setTimeout(()=>{
alert("YOU WIN")
location.reload()
},500)

return
}

if(result==="damage"){
playerHP--
line.innerHTML="💥 被弾 HP-1"
}

if(result==="dead"){
playerHP=0
line.innerHTML="☠ 即死"
}

log.prepend(line)

document.getElementById("php").textContent=playerHP

if(playerHP<=0){
setTimeout(()=>{
alert("YOU LOSE")
location.reload()
},500)
}

}

</script>

</body>
</html>
