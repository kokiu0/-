<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>一点読みバトル</title>

<style>

body{
background:#050505;
color:white;
font-family:sans-serif;
text-align:center;
overflow-x:hidden;
}

/* ルール画面 */

#rules{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:2000;
}

#rules pre{
background:#111;
padding:20px;
border:1px solid #444;
text-align:left;
}

button{
padding:10px 18px;
margin:5px;
font-size:16px;
cursor:pointer;
background:#222;
color:white;
border:1px solid #555;
}

button:hover{
background:#444;
}

.hp{
font-size:22px;
margin:10px;
}

#arena{
font-size:40px;
margin:40px;
transition:0.2s;
}

#log{
height:200px;
overflow:auto;
border:1px solid #333;
padding:10px;
margin-top:20px;
}

/* カットイン */

#cutin{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:80px;
font-weight:bold;
opacity:0;
pointer-events:none;
z-index:999;
}

.win{
background:linear-gradient(90deg,#0066ff,#00ffff);
}

.dead{
background:linear-gradient(90deg,#990000,#ff0000);
}

.show{
opacity:0.9;
}

/* シャキーン */

#slash{
position:fixed;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:linear-gradient(
120deg,
transparent 45%,
white 50%,
transparent 55%
);
opacity:0;
pointer-events:none;
z-index:998;
}

.slashAnim{
animation:slashMove 0.4s ease-out;
}

@keyframes slashMove{

0%{
transform:translateX(-100%) rotate(20deg);
opacity:1;
}

70%{
opacity:1;
}

100%{
transform:translateX(100%) rotate(20deg);
opacity:0;
}

}

/* 必殺スロー */

.slow{
animation:slowMotion 1s ease-out;
}

@keyframes slowMotion{

0%{transform:scale(1)}
30%{transform:scale(1.1)}
60%{transform:scale(1.05)}
100%{transform:scale(1)}

}

</style>
</head>

<body>

<div id="rules">

<h2>ゲームルール</h2>

<pre>
敵：通常攻撃
勝ち → 防御
HP-1 → 回避
即死 → 掴み / 必殺

敵：防御
勝ち → 掴み
HP-1 → 防御 / 回避
即死 → 攻撃 / 必殺

敵：回避
勝ち → 必殺
HP-1 → 防御 / 回避 / 掴み
即死 → 攻撃

敵：掴み
勝ち → 攻撃 / 必殺
HP-1 → 回避 / 掴み
即死 → 防御

敵：必殺
勝ち → 防御
HP-1 → 必殺
即死 → 回避 / 攻撃 / 掴み
</pre>

<button onclick="startGame()">ゲーム開始</button>

</div>

<h1>一点読みバトル</h1>

<div class="hp">HP : <span id="hp">3</span></div>

<div id="arena">
🤺　　　👾
</div>

<div>

<button onclick="play('attack')">攻撃</button>
<button onclick="play('defense')">防御</button>
<button onclick="play('evade')">回避</button>
<button onclick="play('grab')">掴み</button>
<button onclick="play('special')">必殺</button>

</div>

<h3>行動履歴</h3>
<div id="log"></div>

<div id="cutin"></div>
<div id="slash"></div>

<script>

let hp=3

const actions=["attack","defense","evade","grab","special"]

const name={
attack:"攻撃",
defense:"防御",
evade:"回避",
grab:"掴み",
special:"必殺"
}

let history=[]

function startGame(){
document.getElementById("rules").style.display="none"
}

function random(){
return actions[Math.floor(Math.random()*5)]
}

function counter(move){

switch(move){

case "attack": return "attack"
case "defense": return "grab"
case "evade": return "special"
case "grab": return "attack"
case "special": return "defense"

}

}

function enemyAI(){

if(history.length<3){
return random()
}

let count={
attack:0,defense:0,evade:0,grab:0,special:0
}

history.forEach(a=>count[a]++)

let predicted=Object.keys(count).reduce((a,b)=>count[a]>count[b]?a:b)

return counter(predicted)

}

function judge(enemy,player){

switch(enemy){

case "attack":
if(player==="defense") return "win"
if(player==="attack"||player==="evade") return "damage"
return "dead"

case "defense":
if(player==="grab") return "win"
if(player==="defense"||player==="evade") return "damage"
return "dead"

case "evade":
if(player==="special") return "win"
if(player==="defense"||player==="evade"||player==="grab") return "damage"
return "dead"

case "grab":
if(player==="special"||player==="attack") return "win"
if(player==="evade"||player==="grab") return "damage"
return "dead"

case "special":
if(player==="defense") return "win"
if(player==="special") return "damage"
return "dead"

}

}

function slash(){

let s=document.getElementById("slash")

s.classList.add("slashAnim")

setTimeout(()=>{
s.classList.remove("slashAnim")
},400)

}

function cutin(text,type){

let c=document.getElementById("cutin")

c.textContent=text
c.className=type+" show"

setTimeout(()=>{
c.className=""
},900)

}

function slowMotion(){

let arena=document.getElementById("arena")

arena.classList.add("slow")

setTimeout(()=>{
arena.classList.remove("slow")
},1000)

}

function play(player){

if(hp<=0)return

history.push(player)

let enemy=enemyAI()

let result=judge(enemy,player)

let arena=document.getElementById("arena")

arena.textContent="🤺 "+name[player]+" VS "+name[enemy]+" 👾"

if(player==="special" || enemy==="special"){
slowMotion()
}

let log=document.getElementById("log")

let line=document.createElement("div")

if(result==="win"){

slash()
cutin("READ WIN","win")

line.textContent="読み勝ち！"

log.prepend(line)

setTimeout(()=>{
alert("YOU WIN")
location.reload()
},900)

return

}

if(result==="damage"){
hp--
line.textContent="被弾 HP-1"
}

if(result==="dead"){

hp=0

slash()
cutin("INSTANT DEATH","dead")

line.textContent="即死"

}

log.prepend(line)

document.getElementById("hp").textContent=hp

if(hp<=0){

setTimeout(()=>{
alert("YOU LOSE")
location.reload()
},900)

}

}

</script>

</body>
</html>
